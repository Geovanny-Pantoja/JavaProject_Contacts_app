<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Business Contacts</title>    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body class="bg-light">

    <!-- Header Fragment -->


    <div class="container mt-4">
        <div th:replace="~{fragments/header :: header}"></div>

        <div class="card shadow-sm mb-4">
            <div class="card-body">

                <h2 class="text-center mb-4">Business Contacts</h2>

                <!-- Success Message -->
                <div th:if="${success}" class="alert alert-success" role="alert">
                    <span th:text="${success}"></span>
                </div>

                <!-- Error Message -->
                <div th:if="${error}" class="alert alert-danger" role="alert">
                    <span th:text="${error}"></span>
                </div>

            </div>
        </div>
        <div class="card shadow-sm">
            <div class="card-body">

                <table class="table table-striped table-bordered">
                    <thead class="table-dark">
                        <tr>
                            <th>Company</th>
                            <th>Job Title</th>
                            <th>Full Name</th>
                            <th>Email</th>
                            <th>Cell</th>
                            <th>Work Phone</th>
                            <th>Address</th>
                            <th>Actions</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr th:each="c : ${contacts}" th:if="${c != null}">
                            <td th:text="${c.companyName}"></td>
                            <td th:text="${c.jobTitle}"></td>
                            <td th:text="${c.fName + ' ' + c.lName}"></td>
                            <td th:text="${c.email}"></td>
                            <td th:text="${c.cellNumber}"></td>
                            <td th:text="${c.workPhone}"></td>
                            <td>
                                <span th:text="${c.address.street}"></span><br>
                                <span th:text="${c.address.city}"></span>,
                                <span th:text="${c.address.state}"></span>
                                <span th:text="${c.address.zipCode}"></span>
                            </td>
                            <td>
                                <a th:href="@{/contacts/edit/{id}(id=${c.id})}" class="btn btn-sm btn-primary">Edit</a>
                                <a th:href="@{/contacts/delete/{id}(id=${c.id})}" class="btn btn-sm btn-danger ms-1"
                                    onclick="return confirm('Are you sure you want to delete this contact?');">
                                    Delete
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div class="mt-3">
                    <a href="/contacts/add-business" class="btn btn-primary">Add Business Contact</a>
                </div>

            </div>
        </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
