<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Family Contacts</title>    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="bg-light">
    <div class="container mt-4 mb-5">
        <div th:replace="~{fragments/header :: header}"></div>
        <div class="card shadow-sm mt-4">
            <div class="card-body">
                <h2 class="text-center mb-4">Family Contacts</h2>
                <!-- SUCCESS / ERROR MESSAGES (if needed later) -->
                <div th:if="${success}" class="alert alert-success text-center">
                    <span th:text="${success}"></span>
                </div>
                <div th:if="${error}" class="alert alert-danger text-center">
                    <span th:text="${error}"></span>
                </div>
            </div>
        </div>
        <div class="card shadow-sm mt-4">
            <div class="card-body">
                <table th:if="${!#lists.isEmpty(contacts)}" class="table table-striped table-dark">
                    <thead class="table-dark">
                        <tr>
                            <th>Name</th>
                            <th>Relationship</th>
                            <th>Birthday</th>
                            <th>Phone Number</th>
                            <th>Email</th>
                            <th>Address</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="c : ${contacts}">
                            <td th:text="${c.fName + ' ' + c.lName}"></td>
                            <td th:text="${c.relationship}"></td>
                            <td th:text="${c.birthday}"></td>
                            <td th:text="${c.cellNumber}"></td>
                            <td th:text="${c.email}"></td>
                            <td>
                                <div th:text="${c.address.street}"></div>
                                <div>
                                    <span th:text="${c.address.city}"></span>,
                                    <span th:text="${c.address.state}"></span>
                                    <span th:text="${c.address.zipCode}"></span>
                                </div>
                            </td>
                            <td>
                                <a th:href="@{/contacts/delete/{id}(id=${c.id})}" class="btn btn-sm btn-outline-danger"
                                    onclick="return confirm('Are you sure you want to delete this contact?');">Delete</a>
                                <a th:href="@{/contacts/edit/{id}(id=${c.id})}"
                                    class="btn btn-sm btn-outline-secondary">Edit</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div class="mt-3">
                    <a href="/contacts/add-family" class="btn btn-primary">Add Family Contact</a>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
