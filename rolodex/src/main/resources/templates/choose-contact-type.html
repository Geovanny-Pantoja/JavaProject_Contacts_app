<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Add Contact</title>    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body class="bg-light">
    <div class="container mt-4 mb-5">
        <!-- HEADER + NAV -->
        <div th:replace="~{fragments/header :: header}"></div>

        <div class="container mt-4">
            <div class="card shadow-sm mt-4">
                <div class="card-body">
                    <h2 class="text-center mb-4">Add a New Contact</h2>
                    <!-- SUCCESS / ERROR MESSAGES (if needed later) -->
                    <div th:if="${success}" class="alert alert-success text-center">
                        <span th:text="${success}"></span>
                    </div>
                    <div th:if="${error}" class="alert alert-danger text-center">
                        <span th:text="${error}"></span>
                    </div>
                    <!-- SELECT CONTACT TYPE FORM -->
                    <form th:action="@{/contacts/add}" method="post" class="w-50 mx-auto">
                        <div class="mb-3">
                            <label for="entity" class="form-label fw-bold">Select Contact Type</label>
                            <select id="entity" name="entity" class="form-select" required>
                                <option value="" disabled selected>-- Choose Type --</option>
                                <option value="family">Family Contact</option>
                                <option value="business">Business Contact</option>
                                <option value="friend">Friend Contact</option>
                            </select>
                        </div>
                        <div class="text-center">
                            <button type="submit" class="btn btn-primary px-4">Continue</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <!-- BOOTSTRAP JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
