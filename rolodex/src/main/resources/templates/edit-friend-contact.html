<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Edit Friend Contact</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body class="bg-light">
    <div class="container mt-4 mb-5">
        <div th:replace="~{fragments/header :: header}"></div>

        <!-- CARD 1: Title + Messages -->
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h2 class="mb-3">Edit friend Contact</h2>

                <div th:if="${success}" class="alert alert-success">
                    <span th:text="${success}"></span>
                </div>
                <div th:if="${errors}" class="alert alert-danger text-center">
                    <ul>
                        <li th:each="err : ${errors}" th:text="${err}"></li>
                    </ul>
                </div>
            </div>
        </div>
        <!-- CARD 2: Edit Form -->
        <div class="card shadow-sm">
            <div class="card-body">

                <form th:action="@{/contacts/edit/friend}" th:object="${contact}" method="post">
                    <input type="hidden" th:field="*{id}">
                    <div class="row mb-3">
                        <div class="col">
                            <label class="form-label">First Name</label>
                            <input type="text" th:field="*{fName}" class="form-control" required>
                        </div>
                        <div class="col">
                            <label class="form-label">Last Name</label>
                            <input type="text" th:field="*{lName}" class="form-control" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col">
                            <label class="form-label">Email</label>
                            <input type="email" th:field="*{email}" class="form-control" required>
                        </div>
                        <div class="col">
                            <label class="form-label">Cell Number</label>
                            <input type="text" th:field="*{cellNumber}" class="form-control" required>
                        </div>
                        <div class="col">
                            <label class="form-label">How We Met</label>
                            <input type="text" th:field="*{howWeMet}" class="form-control">
                        </div>
                    </div>
                    <h5 class="mt-4 mb-3">Address</h5>
                    <div class="row mb-3">
                        <div class="col-6">
                            <label class="form-label">Street</label>
                            <input type="text" th:field="*{address.street}" class="form-control" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label">City</label>
                            <input type="text" th:field="*{address.city}" class="form-control" required>
                        </div>
                    </div>

                    <div class="row mb-4">
                        <div class="col-4">
                            <label class="form-label">State</label>
                            <input type="text" th:field="*{address.state}" class="form-control" required>
                        </div>
                        <div class="col-4">
                            <label class="form-label">Zip Code</label>
                            <input type="text" th:field="*{address.zipCode}" class="form-control" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <a href="/contacts/friend" class="btn btn-secondary ms-2">Cancel</a>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
