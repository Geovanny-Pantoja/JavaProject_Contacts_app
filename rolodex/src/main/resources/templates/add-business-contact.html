<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Add Business Contact</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body class="bg-light">
    <div class="container mt-4 mb-5">
        <div th:replace="~{fragments/header :: header}"></div>
        <div class="container mt-4">
            <!-- Card Wrapper -->
            <div class="card shadow-sm mt-4">
                <div class="card-body">
                    <h2 class="text-center mb-4">Add Business Contact</h2>

                    <!-- Success / Error Messages -->
                    <div th:if="${success}" class="alert alert-success text-center">
                        <span th:text="${success}"></span>
                    </div>
                    <div th:if="${error}" class="alert alert-danger text-center">
                        <span th:text="${error}"></span>
                    </div>
                    <form th:action="@{/contacts/save-business}" th:object="${contact}" method="post"
                        class="w-50 mx-auto">

                        <input type="hidden" name="entity" value="business">

                        <!-- Name Row -->
                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label">First Name</label>
                                <input type="text" th:field="*{fName}" class="form-control" required>
                            </div>
                            <div class="col">
                                <label class="form-label">Last Name</label>
                                <input type="text" th:field="*{lName}" class="form-control" required>
                            </div>
                        </div>

                        <!-- Contact Info Row -->
                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label">Email</label>
                                <input type="email" th:field="*{email}" class="form-control" required>
                            </div>
                            <div class="col">
                                <label class="form-label">Cell Number</label>
                                <input type="text" th:field="*{cellNumber}" class="form-control" required>
                            </div>
                        </div>

                        <!-- Business Info Row -->
                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label">Company Name</label>
                                <input type="text" th:field="*{companyName}" class="form-control" required>
                            </div>
                            <div class="col">
                                <label class="form-label">Job Title</label>
                                <input type="text" th:field="*{jobTitle}" class="form-control" required>
                            </div>
                        </div>

                        <!-- Work Phone -->
                        <div class="mb-3">
                            <label class="form-label">Work Phone</label>
                            <input type="text" th:field="*{workPhone}" class="form-control" required>
                        </div>

                        <!-- Address Section -->
                        <h5 class="mt-4 mb-3">Address</h5>

                        <div class="mb-3">
                            <label class="form-label">Street</label>
                            <input type="text" th:field="*{address.street}" class="form-control" required>
                        </div>

                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label">City</label>
                                <input type="text" th:field="*{address.city}" class="form-control" required>
                            </div>
                            <div class="col">
                                <label class="form-label">State</label>
                                <input type="text" th:field="*{address.state}" class="form-control" required>
                            </div>
                            <div class="col">
                                <label class="form-label">Zip Code</label>
                                <input type="text" th:field="*{address.zipCode}" class="form-control" required>
                            </div>
                        </div>

                        <!-- Buttons -->
                        <div class="d-flex justify-content-between mt-4">
                            <a th:href="@{/contacts/business}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">Add Business Contact</button>
                        </div>

                    </form>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js">
    </script>

</body>

</html>
