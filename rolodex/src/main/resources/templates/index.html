<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Rolodex Contact Manager - Week 5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body class="bg-light">
    <div class="container mt-4 mb-5">
        <!-- INCLUDE HEADER -->
        <div th:replace="~{fragments/header :: header}"></div>

        <!-- MAIN CONTENT -->
        <div class="card shadow-sm mt-4">
            <div class="card-body">
                <h2 class="card-title text-center mb-3">Welcome to the Rolodex Contact Manager Web Application!</h2>
                <p class="card-text text-center">
                    In This application you wil be able to create and manage your contacts in a simple and efficient
                    way.
                    Use the navigation menu above to add new contacts or view your saved contacts.
                </p>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js">
    </script>
</body>

</html>
